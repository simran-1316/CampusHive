<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, intial-scale=1.0" />
    <title>Member's Profile</title>
  </head>
  <body>
    <header>
      <h1>CAMPUS HIVE</h1>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="clubs.html">Clubs</a></li>
          <li><a href="events.html">Events</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <h2>Member's Profile</h2>
      <section>
        <p>ID: <span id="id"></span></p>
        <p>Name: <span id="name"></span></p>
        <p>Club: <span id="club"></span></p>
        <p>Position: <span id="role"></span></p>
        <p>Skills: <span id="tech"></span></p>
      </section>
    </main>
  </body>

  <script>
    let id = new URL(window.location.href).searchParams.get('id');

    let students = [
      {
        id: '1',
        name: 'Vishnu',
        club: 'Coding Club',
        role: 'Lead Developer',
        tech: 'HTML, CSS, JavaScript',
      },
      {
        id: '2',
        name: 'Sahil',
        club: 'Robotics Club',
        role: 'Hardware Lead',
        tech: 'Arduino, Sensors',
      },
      {
        id: '3',
        name: 'AbdurRehman',
        club: 'Literary Club',
        role: 'Content Head',
        tech: 'Writing, Editing',
      },
      {
        id: '4',
        name: 'Simran',
        club: 'Design Club',
        role: 'Creative Lead',
        tech: 'Figma, Canva',
      },
    ];

    let student = students.find((e) => e.id === id);
    console.log(student);

    document.getElementById('id').innerText = student.id;
    document.getElementById('name').innerText = student.name;
    document.getElementById('club').innerText = student.club;
    document.getElementById('role').innerText = student.role;
    document.getElementById('tech').innerText = student.tech;
  </script>
</html>
